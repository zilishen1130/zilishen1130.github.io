  <main class="page reveal">
    <p class="eyebrow">Contact</p>
    <h2 class="page-title">Get in touch<span class="dot">.</span></h2>
    <svg class="lily-mark" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true">
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z"/>
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z" transform="rotate(60 24 24)"/>
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z" transform="rotate(120 24 24)"/>
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z" transform="rotate(180 24 24)"/>
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z" transform="rotate(240 24 24)"/>
      <path d="M24 25 C20 17 20 10 24 5 C28 10 28 17 24 25 Z" transform="rotate(300 24 24)"/>
      <circle cx="24" cy="24" r="2.3" fill="currentColor" stroke="none"/>
    </svg>
    <p class="lead">Leave me a message below, or reach me directly by email.</p>

    <!-- =========================================================
         CONTACT FORM — to make it actually deliver messages:
         1. Sign up free at https://formspree.io (or web3forms.com / getform.io).
         2. Create a form and copy your endpoint URL.
         3. Replace YOUR_FORM_ID in action="..." below with it.
         GitHub Pages can't receive messages itself; the form service does,
         and emails each submission to you.
         ========================================================= -->
    <form class="form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label for="name">Name</label>
      <input id="name" type="text" name="name" required />
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required />
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
      <button class="btn" type="submit">Send</button>
    </form>

    <ul class="contact-list">
      <li><span class="k">email</span> <a href="mailto:zili.shen@my.utexas.edu">zili.shen@my.utexas.edu</a></li>
    </ul>
  </main>

  <footer class="foot">&copy; 2026 Zili Shen <span class="dot">&middot;</span> built with HTML &amp; CSS <span class="dot">&middot;</span> GitHub Pages</footer>
  <script>
    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }), { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  </script>
